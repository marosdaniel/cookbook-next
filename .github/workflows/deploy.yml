name: Deploy to Vercel Production

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.vscode/**'
      - '.github/**'
      - '!.github/workflows/**'
      - 'LICENSE'
      - '.gitignore'
      - '.env.example'
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.vscode/**'
      - 'LICENSE'
      - '.gitignore'
      - '.env.example'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  quality-checks:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, '[ci skip]')"
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.16.0

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Biome Lint
        run: pnpm lint:fix

      - name: Run Type Check
        run: pnpm run typecheck

      - name: Run Unit Tests
        run: pnpm test:unit

      - name: Run Integration Tests
        run: pnpm test:integration

  e2e:
    needs: quality-checks
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.16.0

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright tests
        run: pnpm test:e2e

      - name: Generate E2E Summary
        if: always()
        run: |
          echo "## E2E Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f test-results/e2e-results.json ]; then
            PASSED=$(jq -r '.stats.expected // 0' test-results/e2e-results.json)
            FAILED=$(jq -r '.stats.unexpected // 0' test-results/e2e-results.json)
            FLAKY=$(jq -r '.stats.flaky // 0' test-results/e2e-results.json)
            SKIPPED=$(jq -r '.stats.skipped // 0' test-results/e2e-results.json)
            TOTAL=$((PASSED + FAILED + FLAKY + SKIPPED))

            echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Total | ${TOTAL} |" >> $GITHUB_STEP_SUMMARY
            echo "| Passed | ${PASSED} |" >> $GITHUB_STEP_SUMMARY
            echo "| Failed | ${FAILED} |" >> $GITHUB_STEP_SUMMARY
            echo "| Flaky | ${FLAKY} |" >> $GITHUB_STEP_SUMMARY
            echo "| Skipped | ${SKIPPED} |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "[View Full E2E Report](https://marosdaniel.github.io/cookbook-next/e2e/)" >> $GITHUB_STEP_SUMMARY
          else
            echo "E2E JSON report was not generated." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

  test-coverage:
    needs: quality-checks
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.16.0

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Coverage
        run: pnpm test:coverage

      - name: Generate Coverage Summary
        id: coverage-summary
        run: |
          echo "## Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Category | Percentage |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|------------|" >> $GITHUB_STEP_SUMMARY

          if [ -f coverage/coverage-summary.json ]; then
            LINES=$(jq -r '.total.lines.pct // 0' coverage/coverage-summary.json)
            STATEMENTS=$(jq -r '.total.statements.pct // 0' coverage/coverage-summary.json)
            FUNCTIONS=$(jq -r '.total.functions.pct // 0' coverage/coverage-summary.json)
            BRANCHES=$(jq -r '.total.branches.pct // 0' coverage/coverage-summary.json)
          else
            LINES=0
            STATEMENTS=0
            FUNCTIONS=0
            BRANCHES=0
          fi

          echo "| Lines | ${LINES}% |" >> $GITHUB_STEP_SUMMARY
          echo "| Statements | ${STATEMENTS}% |" >> $GITHUB_STEP_SUMMARY
          echo "| Functions | ${FUNCTIONS}% |" >> $GITHUB_STEP_SUMMARY
          echo "| Branches | ${BRANCHES}% |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[View Full Coverage Report](https://marosdaniel.github.io/cookbook-next/coverage/)" >> $GITHUB_STEP_SUMMARY

          echo "lines=$LINES" >> $GITHUB_OUTPUT

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          fail_ci_if_error: false

  sonarqube:
    name: SonarQube Cloud Scan
    needs: test-coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Download coverage artifact
        uses: actions/download-artifact@v8
        with:
          name: coverage-report
          path: coverage

      - name: Verify coverage report
        run: |
          if [ ! -f coverage/lcov.info ]; then
            echo "ERROR: coverage/lcov.info was not found."
            find coverage -maxdepth 3 -type f || true
            exit 1
          fi

      - name: SonarQube Cloud Scan
        uses: SonarSource/sonarqube-scan-action@v8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  deploy-coverage-report:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: [test-coverage, e2e]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write
      actions: write
    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Download coverage artifact
        uses: actions/download-artifact@v8
        with:
          name: coverage-report
          path: artifacts/coverage

      - name: Download E2E artifact
        uses: actions/download-artifact@v8
        with:
          name: playwright-report
          path: artifacts/e2e

      - name: Build reports site
        run: |
          mkdir -p reports
          cp -R artifacts/coverage reports/coverage

          if [ -d artifacts/e2e/playwright-report ]; then
            cp -R artifacts/e2e/playwright-report reports/e2e
          fi

          cat > reports/index.html << 'EOF'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>Test Reports</title>
            <style>
              body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 2rem; line-height: 1.5; }
              h1 { margin-bottom: 1rem; }
              ul { padding-left: 1.2rem; }
              li { margin-bottom: 0.5rem; }
            </style>
          </head>
          <body>
            <h1>Cookbook Next Test Reports</h1>
            <ul>
              <li><a href="./coverage/">Coverage Report</a></li>
              <li><a href="./e2e/">E2E Playwright Report</a></li>
            </ul>
          </body>
          </html>
          EOF

      - name: Add published links to summary
        run: |
          echo "## Published Reports" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- [Coverage](https://marosdaniel.github.io/cookbook-next/coverage/)" >> $GITHUB_STEP_SUMMARY
          echo "- [E2E](https://marosdaniel.github.io/cookbook-next/e2e/)" >> $GITHUB_STEP_SUMMARY

      - name: Remove stale github-pages artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          RUN_ID="${{ github.run_id }}"
          ARTIFACT_IDS=$(gh api "repos/$REPO/actions/runs/$RUN_ID/artifacts" --jq '.artifacts[] | select(.name=="github-pages") | .id')
          for ID in $ARTIFACT_IDS; do
            echo "Deleting stale github-pages artifact $ID"
            gh api -X DELETE "repos/$REPO/actions/artifacts/$ID" || true
          done

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v5
        with:
          path: reports

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  deploy-production:
    needs: [quality-checks, e2e]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.16.0

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Debug - Check Vercel Token
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "ERROR: VERCEL_TOKEN is empty or not set!"
            exit 1
          else
            echo "VERCEL_TOKEN is set (length: ${#VERCEL_TOKEN} characters)"
          fi

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run Prisma Migrate Deploy
        run: |
          for attempt in 1 2 3; do
            if pnpm prisma migrate deploy; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "Migration attempt $attempt failed; retrying in 15 seconds..."
              sleep 15
            fi
          done
          exit 1
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL || secrets.DATABASE_URL }}
          PRISMA_SCHEMA_DISABLE_ADVISORY_LOCK: '1'

      - name: Build Project Artifacts
        run: vercel build --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DATABASE_URL }}

      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  semantic-release:
    needs: deploy-production
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.16.0

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm exec semantic-release